<html>
<head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
</head>
<body>
    <a-scene>
        <a-assets>
            <img id="suelo" src="suelos.jpg">
            <img id="pared" src="paredes.jpg">
            <img id="viga" src="vigas.jpg">
            <img id="cielo" src="campo.jpg">
        </a-assets>
        <a-box position="0 0.1 0" width="3" height="0.2" depth="3"src="#suelo"></a-box>
        <a-box position="0 1.5 -1.5"width="3" height="3" depth="0.1"src="#pared"></a-box>
        <a-box position="1.5 1.5 -1.125"rotation="0 90 0"width="0.75" height="3" depth="0.1"src="#pared"></a-box>
        <a-box position="1.5 1.5 1.125"rotation="0 90 0"width="0.75" height="3" depth="0.1"src="#pared"></a-box>
        <a-box position="1.5 2.6 0"rotation="0 90 0"width="1.5" height="0.75" depth="0.1"src="#pared"></a-box>
        <a-box position="1.5 0.4 0"rotation="0 90 0"width="1.5" height="0.75" depth="0.1"src="#pared"></a-box>
        <a-box position="-1.5 1.5 0"rotation="0 90 0"width="3" height="3" depth="0.1"src="#pared"></a-box>
        <a-box position="0 3.05 0"width="3" height="0.1" depth="3"src="#viga"></a-box>
        <a-light type="ambient" position="3 3 3" color="#FFF"></a-light>
        <a-entity position="0 1 3">
            <a-camera></a-camera>
        </a-entity>
        <a-sky src="#cielo"></a-sky>
    </a-scene>
</body>
</html>
